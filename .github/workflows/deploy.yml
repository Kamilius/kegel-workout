name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject cache version from commit hash
        run: |
          VERSION=$(git rev-parse --short HEAD)
          sed -i "s/kegel-v[a-zA-Z0-9]*/kegel-$VERSION/" sw.js
          sed -i "s/sw\.js?v=[^'\"']*/sw.js?v=$VERSION/" app.js

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
